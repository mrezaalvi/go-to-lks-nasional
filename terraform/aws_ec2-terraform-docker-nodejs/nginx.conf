# nginx/nginx.conf

# Limit request body (sesuaikan jika app perlu upload file besar)
client_max_body_size 10M;

# Sembunyikan versi Nginx dari response header
server_tokens off;

server {
    listen 80;
    server_name _;   # Ganti dengan domain kamu jika sudah punya

    # Jika sudah punya SSL, redirect semua HTTP ke HTTPS:
    # return 301 https://$host$request_uri;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Proxy ke Express app (nama service di Docker Compose = "app")
    location / {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;

        # WebSocket support (hapus jika tidak dipakai)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Health check endpoint (bypass ke app langsung)
    location /health {
        proxy_pass http://app:3000/health;
        access_log off;
    }
}

